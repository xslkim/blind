<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">
  <title>林夏</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;background:#000;
      overflow:hidden;touch-action:none;
      -webkit-tap-highlight-color:transparent;
      user-select:none;-webkit-user-select:none;
      font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;
    }
    #game{position:fixed;inset:0;background:#000;}

    /* ── 开始界面 ── */
    #start{
      position:fixed;inset:0;background:#000;z-index:80;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:#fff;text-align:center;padding:40px;
    }
    #start h1{font-size:38px;font-weight:200;letter-spacing:14px;margin-bottom:28px}
    #start .sub{font-size:14px;color:#777;line-height:2.4}
    #start .hint{margin-top:48px;font-size:12px;color:#444;animation:pulse 2.5s ease-in-out infinite}
    #start .tip{margin-top:16px;font-size:11px;color:#2a2a2a;line-height:1.9}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

    /* ── 字幕层（结局文字）── */
    #caption{
      position:fixed;inset:0;z-index:60;
      display:none;align-items:center;justify-content:center;
      color:#fff;font-size:18px;font-weight:300;letter-spacing:4px;
      text-align:center;line-height:2;padding:40px;
      animation:fadein .8s ease-out;
    }
    @keyframes fadein{from{opacity:0}to{opacity:1}}

    /* ── 调试条（开发用） ── */
    #dbg{
      display:none;
      position:fixed;bottom:30px;left:0;right:0;text-align:center;
      font-size:11px;color:#333;z-index:200;pointer-events:none;font-family:monospace;
    }
  </style>
</head>
<body>
<div id="game"></div>

<div id="start">
  <h1>林夏</h1>
  <div class="sub">
    今晚 16 条消息<br>
    你接谁，不接谁<br>
    决定明天的自己
  </div>
  <div class="hint">· 轻触屏幕开始 ·</div>
  <div class="tip">
    建议关灯 · 戴上耳机<br>
    全程约 60 分钟
  </div>
</div>

<div id="caption"></div>
<div id="dbg"></div>

<script src="js/utils.js"></script>
<script src="js/haptics.js"></script>
<script src="js/audio.js"></script>
<script src="js/gestures.js"></script>
<script src="js/profile.js"></script>
<script src="js/story.js"></script>
<script src="js/engine.js"></script>
<script src="js/main.js"></script>
</body>
</html>
